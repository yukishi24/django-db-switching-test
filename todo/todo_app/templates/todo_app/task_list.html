<!-- todo/todo_app/templates/todo_app/task_list.html -->
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
</head>
<body>
    <h1>Todo List</h1>

    <!-- タスク追加フォーム -->
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">追加</button>
    </form>

    <ul>
        {% for task in tasks %}
            <li>{{ task.title }}</li>
        {% empty %}
            <li>No tasks yet.</li>
        {% endfor %}
    </ul>
</body>
</html>
